     n'a pas injecté les résultats inline dans #quiz-zone)

     résultats directement dans la zone quiz.
     Cette page sert de fallback de navigation directe.
     ================================================ -->

<div class="resultats-page">

    <span class="empty-state__icon" aria-hidden="true">🏁</span>
    <p class="empty-state__text">
      Session terminée !<br>
      Retourne à l'accueil pour voir tes progrès.
    </p>
    <button class="btn btn--primary mt-4" onclick="naviguer('dashboard')">
      🏠 Retour à l'accueil
    </button>
  </div>
</div>
