<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Jay</title>
  <script>
    /* ================================================
       404.html — GitHub Pages SPA routing fallback
       Technique : stocker l'URL complète dans sessionStorage,
       puis rediriger vers index.html qui la lit.
       ================================================ */
    sessionStorage.setItem('redirect', location.href);
    location.replace(
      location.href
        .replace(location.pathname + location.search, '/')
    );
  </script>
</head>
<body></body>
</html>
