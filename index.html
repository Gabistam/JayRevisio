<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Study Jay — Application de révision pour le Brevet des collèges" />
  <meta name="theme-color" content="#0f0f1a" />

  <title>Study Jay — Révision Brevet</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet"
  />

  <!-- CSS global (chargé en premier — contient les variables) -->
  <link rel="stylesheet" href="css/main.css" />

  <!-- GitHub Pages SPA redirect handler -->
  <script>
    (function () {
      /* Récupère le chemin encodé par 404.html */
      var redirect = sessionStorage.getItem('redirect');
      if (redirect) {
        sessionStorage.removeItem('redirect');
        var url = new URL(redirect);
        var path = url.searchParams.get('/') || url.hash.replace('#', '');
        if (path) window.location.hash = path;
      }
    })();
  </script>

  <!-- CSS des vues (injectés dynamiquement selon la vue active) -->
  <!-- dashboard.css, matiere.css, quiz.css seront chargés par le router -->
</head>
<body>

  <!-- =============================================
       HEADER GLOBAL — persistant sur toutes les vues
  ============================================= -->
  <header class="app-header" id="app-header">
    <div class="header-inner">

      <!-- Logo + nom -->
      <a href="#dashboard" class="header-logo" aria-label="Accueil Study Jay">
        <span class="logo-icon" aria-hidden="true">📚</span>
        <span class="logo-text">Study Jay</span>
      </a>

      <!-- Infos joueur (affichées quand profil chargé) -->
      <div class="header-player" id="header-player" aria-live="polite">
        <!-- Injecté par gamification.js au Sprint 2 -->
        <!-- Mockup Sprint 1 : affiché statiquement -->
        <span class="player-niveau" id="header-niveau">🪖 Recrue</span>
        <div class="player-xp-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="200" aria-label="Barre XP">
          <div class="player-xp-fill" id="header-xp-fill" style="width: 0%"></div>
        </div>
        <span class="player-xp-label" id="header-xp-label">0 / 200 XP</span>
      </div>

      <!-- Actions header -->
      <div class="header-actions">
        <!-- Toggle dark/light mode -->
        <button
          class="btn-icon"
          id="btn-theme-toggle"
          aria-label="Basculer thème clair/sombre"
          title="Thème"
        >
          <span class="icon-theme" aria-hidden="true">🌙</span>
        </button>

        <!-- Lien profil -->
        <a href="#profil" class="btn-icon" aria-label="Mon profil">
          <span aria-hidden="true">👤</span>
        </a>
      </div>

    </div>
  </header>

  <!-- =============================================
       ZONE PRINCIPALE — les vues SPA sont injectées ici
  ============================================= -->
  <main class="app-main" id="app-main" role="main">
    <!-- Le contenu HTML de chaque page est chargé ici par le router -->
    <div class="view-loader" id="view-loader" aria-live="assertive" aria-label="Chargement en cours">
      <div class="spinner" aria-hidden="true"></div>
    </div>
  </main>

  <!-- =============================================
       NAV BAS — mobile uniquement
  ============================================= -->
  <nav class="bottom-nav" id="bottom-nav" aria-label="Navigation principale">
    <a href="#dashboard" class="bottom-nav-item active" data-view="dashboard" aria-label="Accueil">
      <span class="nav-icon" aria-hidden="true">🏠</span>
      <span class="nav-label">Accueil</span>
    </a>
    <a href="#maths" class="bottom-nav-item" data-view="matiere" data-matiere="maths" aria-label="Maths">
      <span class="nav-icon" aria-hidden="true">📐</span>
      <span class="nav-label">Maths</span>
    </a>
    <a href="#histoire-geo" class="bottom-nav-item" data-view="matiere" data-matiere="histoire-geo" aria-label="Histoire-Géo">
      <span class="nav-icon" aria-hidden="true">🗺️</span>
      <span class="nav-label">Histoire</span>
    </a>
    <a href="#physique-chimie" class="bottom-nav-item" data-view="matiere" data-matiere="physique-chimie" aria-label="Physique-Chimie">
      <span class="nav-icon" aria-hidden="true">⚗️</span>
      <span class="nav-label">Physique</span>
    </a>
    <a href="#svt" class="bottom-nav-item" data-view="matiere" data-matiere="svt" aria-label="SVT">
      <span class="nav-icon" aria-hidden="true">🌿</span>
      <span class="nav-label">SVT</span>
    </a>
  </nav>

  <!-- =============================================
       TOAST NOTIFICATIONS — XP, badges, messages
  ============================================= -->
  <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- =============================================
       SCRIPTS — ordre important
  ============================================= -->
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/gamification.js"></script>
  <script src="js/quiz-engine.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
